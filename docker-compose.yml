version: '3.8'

services:
  folk-idle-db:
    image: postgres:16-alpine
    container_name: folk-idle-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: folkidle_prod
    ports:
      - "5432:5432"
    command: >
      postgres
      -c synchronous_commit=off
      -c max_connections=500
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  folk-idle-server:
    build:
      context: ./server/FolkIdle.Server
      dockerfile: Dockerfile
    container_name: folk-idle-server
    environment:
      - ConnectionStrings__DefaultConnection=Host=folk-idle-db;Database=folkidle_prod;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      - folk-idle-db
    restart: unless-stopped

volumes:
  postgres-data:
