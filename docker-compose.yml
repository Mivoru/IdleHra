version: '3.8'

services:
  folk-idle-db:
    image: postgres:16-alpine
    container_name: folk-idle-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: folkidle_prod
    ports:
      - "5432:5432"
    command: >
      postgres
      -c synchronous_commit=off
      -c max_connections=500
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  folk-idle-pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: folk-idle-pgbouncer
    environment:
      - DB_HOST=folk-idle-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=folkidle_prod
      # Transaction-mode pooling: a pooled connection is only reserved for
      # the lifetime of one transaction and returned to the pool the moment
      # it commits or rolls back. This matches how the server ever uses a
      # connection - AuthenticationEngine.LoginOrProvisionAsync and every
      # other transaction in this codebase is opened, used, and committed
      # or rolled back within a single logical operation, never held open
      # across unrelated requests - so pooling at the transaction boundary
      # is safe and lets far more concurrent short-lived Serializable
      # transactions share a small, fixed number of real Postgres backend
      # connections instead of each request opening its own.
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
      - AUTH_TYPE=plain
    ports:
      - "6432:5432"
    depends_on:
      - folk-idle-db
    restart: unless-stopped

  folk-idle-server:
    build:
      # Context is server/ (not server/FolkIdle.Server/) so the build can see
      # server/GameData/ - the Content Pipeline's JSON data lives there,
      # sibling to FolkIdle.Server/, and Docker COPY cannot reach outside its
      # build context. See FolkIdle.Server/Dockerfile's matching path changes.
      context: ./server
      dockerfile: FolkIdle.Server/Dockerfile
    container_name: folk-idle-server
    environment:
      # Program.cs reads FOLKIDLE_DB_CONN via Environment.GetEnvironmentVariable
      # directly - ConnectionStrings__DefaultConnection (the ASP.NET
      # configuration-binding convention) is never read anywhere in this
      # codebase, so setting that name here silently connected to nothing:
      # DOTNET_ENVIRONMENT was also unset, so Program.cs's isProduction guard
      # never fired and it fell back to Host=localhost, which inside this
      # container has no Postgres listening at all (only the separate
      # folk-idle-db service does). DOTNET_ENVIRONMENT=Production is set here
      # so any future regression of this kind fails loudly at startup instead
      # of silently connecting to the wrong host.
      - DOTNET_ENVIRONMENT=Production
      # Points at folk-idle-pgbouncer, not folk-idle-db directly - every
      # connection the server opens is now pooled by pgbouncer rather than
      # consuming a dedicated Postgres backend connection per request.
      - FOLKIDLE_DB_CONN=Host=folk-idle-pgbouncer;Port=5432;Database=folkidle_prod;Username=postgres;Password=postgres
      # REDIS_CONNECTION is intentionally not set here - no Redis service is
      # defined in this compose file, and Program.cs already degrades
      # gracefully without one (AbortOnConnectFail=false; session locking,
      # write-behind, and telemetry streaming simply no-op).
      # JWT_SECRET_KEY is mandatory once DOTNET_ENVIRONMENT=Production - see
      # Program.cs's isProductionForJwt guard. This placeholder value is for
      # local compose orchestration only; replace it with a real secret
      # (e.g. an env_file entry or Docker secret) for any shared deployment.
      - JWT_SECRET_KEY=folkidle-compose-local-jwt-secret-key-not-for-production-use
    ports:
      - "8080:8080"
    depends_on:
      - folk-idle-db
      - folk-idle-pgbouncer
    restart: unless-stopped

volumes:
  postgres-data:
