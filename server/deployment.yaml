apiVersion: apps/v1
kind: Deployment
metadata:
  name: folkidle-server
  labels:
    app: folkidle-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: folkidle-server
  template:
    metadata:
      labels:
        app: folkidle-server
    spec:
      terminationGracePeriodSeconds: 90
      containers:
      - name: folkidle-server
        image: folkidle-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        # Required for the stateless architecture: FOLKIDLE_DB_CONN and
        # REDIS_CONNECTION are the exact names Program.cs reads via
        # Environment.GetEnvironmentVariable. DOTNET_ENVIRONMENT=Production
        # makes a missing FOLKIDLE_DB_CONN a hard startup failure instead of
        # silently falling back to the local-development connection string
        # (see Program.cs's isProduction guard).
        #
        # The referenced Secret is provisioned out of band, never committed
        # to this repository. Example:
        #   kubectl create secret generic folkidle-server-secrets \
        #     --from-literal=postgres-connection-string="Host=...;Database=...;Username=...;Password=..." \
        #     --from-literal=redis-connection-string="redis-host:6379" \
        #     --from-literal=jwt-secret-key="<random high-entropy secret, rotate periodically>"
        env:
        - name: DOTNET_ENVIRONMENT
          value: "Production"
        - name: FOLKIDLE_DB_CONN
          valueFrom:
            secretKeyRef:
              name: folkidle-server-secrets
              key: postgres-connection-string
        - name: REDIS_CONNECTION
          valueFrom:
            secretKeyRef:
              name: folkidle-server-secrets
              key: redis-connection-string
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: folkidle-server-secrets
              key: jwt-secret-key
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        # Distinct paths matching InfrastructureHealthMonitor's distinct
        # semantics - liveness (IsLive) only checks whether the process is
        # mid-shutdown and should be restarted if it fails; readiness
        # (IsReady) additionally requires cold-boot session recovery to have
        # completed and heap usage under the readiness limit, so a pod still
        # reconstructing sessions never receives live traffic. Both
        # previously pointed at the same always-200 /healthz stub, which
        # made this distinction meaningless.
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
