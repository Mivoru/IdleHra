apiVersion: apps/v1
kind: Deployment
metadata:
  name: folkidle-server
  labels:
    app: folkidle-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: folkidle-server
  template:
    metadata:
      labels:
        app: folkidle-server
    spec:
      terminationGracePeriodSeconds: 90
      containers:
      - name: folkidle-server
        image: folkidle-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
