syntax = "proto3";

option csharp_namespace = "FolkIdle.Server.Mesh";

package folkidle.tournament;

service GlobalTournamentService {
  rpc SyncMatchState (SyncMatchStateRequest) returns (SyncMatchStateResponse);
}

message SyncMatchStateRequest {
  string match_uuid = 1;
  int64 attacker_account_id = 2;
  int64 inflicted_damage_sum = 3;
  bool is_final_blow = 4;
}

message SyncMatchStateResponse {
  uint32 processing_status = 1;
  int64 global_node_remaining_hp = 2;
}
