name: Build, Test, and Deploy

# Runs on every push to main: builds the server and its integration test
# suite, runs the full Testcontainers-backed test suite, and - only if that
# suite is green - builds the production server image and pushes it tagged
# with the commit SHA.

on:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  TEST_PROJECT_PATH: server/FolkIdle.Server.Tests/FolkIdle.Server.Tests.csproj
  DOCKERFILE_CONTEXT: server/FolkIdle.Server
  DOCKERFILE_PATH: server/FolkIdle.Server/Dockerfile

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # The Tests project has a ProjectReference to FolkIdle.Server, so
      # restoring/building it transitively restores/builds the server too -
      # there is no solution file in this repository, only individual
      # csproj files.
      - name: Restore dependencies
        run: dotnet restore "${{ env.TEST_PROJECT_PATH }}"

      - name: Build (Release)
        run: dotnet build "${{ env.TEST_PROJECT_PATH }}" --no-restore --configuration Release

      # The integration suite spins up real Postgres instances via
      # Testcontainers against the Docker daemon already available on
      # GitHub-hosted ubuntu-latest runners - no extra service containers
      # are required here.
      - name: Run integration test suite
        run: dotnet test "${{ env.TEST_PROJECT_PATH }}" --no-build --configuration Release --verbosity normal

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cleanly parameterized via repository secrets: if REGISTRY_URL,
      # REGISTRY_USERNAME, and REGISTRY_PASSWORD are all configured, those
      # are used unchanged. If they are not configured, this falls back to
      # GitHub Container Registry (ghcr.io) under the repository owner,
      # authenticated with the automatically provided GITHUB_TOKEN - a
      # working placeholder that requires no additional account setup.
      - name: Resolve container registry
        id: registry
        run: |
          if [ -n "${{ secrets.REGISTRY_URL }}" ]; then
            echo "url=${{ secrets.REGISTRY_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL != '' && secrets.REGISTRY_URL || 'ghcr.io' }}
          username: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD != '' && secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Uses server/FolkIdle.Server/Dockerfile - the one docker-compose.yml
      # actually builds from - not the alternate server/Dockerfile
      # (a different chiseled-runtime variant with a different build
      # context that nothing else in this repository references).
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKERFILE_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ steps.registry.outputs.url }}:${{ github.sha }}
            ${{ steps.registry.outputs.url }}:latest
