name: Build, Test, and Deploy

# Runs on every push to main: builds the server and its integration test
# suite, runs the full Testcontainers-backed test suite, and - only if that
# suite is green - builds the production server image and pushes it tagged
# with the commit SHA.

on:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  TEST_PROJECT_PATH: server/FolkIdle.Server.Tests/FolkIdle.Server.Tests.csproj
  DOCKERFILE_CONTEXT: server/FolkIdle.Server
  DOCKERFILE_PATH: server/FolkIdle.Server/Dockerfile

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required pre-build gate: structurally validates every
      # server/GameData/*.json against the same rules
      # ContentRegistry.Initialize/ActiveSkillEngine.Initialize enforce at
      # server boot. A malformed content file fails the pipeline here, in
      # seconds, before any dotnet build or Docker push - previously it
      # would only surface as a crash-looping pod at rollout.
      - name: Validate content data
        run: python3 ops/validate_content.py --path server/GameData

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # The Tests project has a ProjectReference to FolkIdle.Server, so
      # restoring/building it transitively restores/builds the server too -
      # there is no solution file in this repository, only individual
      # csproj files.
      - name: Restore dependencies
        run: dotnet restore "${{ env.TEST_PROJECT_PATH }}"

      - name: Build (Release)
        run: dotnet build "${{ env.TEST_PROJECT_PATH }}" --no-restore --configuration Release

      # The integration suite spins up real Postgres instances via
      # Testcontainers against the Docker daemon already available on
      # GitHub-hosted ubuntu-latest runners - no extra service containers
      # are required here.
      - name: Run integration test suite
        run: dotnet test "${{ env.TEST_PROJECT_PATH }}" --no-build --configuration Release --verbosity normal

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cleanly parameterized via repository secrets: if REGISTRY_URL,
      # REGISTRY_USERNAME, and REGISTRY_PASSWORD are all configured, those
      # are used unchanged. If they are not configured, this falls back to
      # GitHub Container Registry (ghcr.io) under the repository owner,
      # authenticated with the automatically provided GITHUB_TOKEN - a
      # working placeholder that requires no additional account setup.
      - name: Resolve container registry
        id: registry
        run: |
          if [ -n "${{ secrets.REGISTRY_URL }}" ]; then
            echo "url=${{ secrets.REGISTRY_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL != '' && secrets.REGISTRY_URL || 'ghcr.io' }}
          username: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD != '' && secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Uses server/FolkIdle.Server/Dockerfile - the one docker-compose.yml
      # actually builds from - not the alternate server/Dockerfile
      # (a different chiseled-runtime variant with a different build
      # context that nothing else in this repository references).
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKERFILE_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ steps.registry.outputs.url }}:${{ github.sha }}
            ${{ steps.registry.outputs.url }}:latest

  # Applies pending EF Core migrations against the production database as a
  # one-shot K8s Job (ops/jobs/apply-migrations.yaml) using the exact image
  # just pushed, BEFORE any new server pods roll out - a single migration
  # container instead of multiple replicas racing Database.Migrate at
  # startup. The whole job is gated on the KUBE_CONFIG secret being
  # configured: until a production cluster's kubeconfig is provided, this
  # job is skipped (not failed), preserving the previous build-and-push-only
  # behavior for forks and pre-production checkouts.
  migrate:
    name: Run Migrations
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.KUBE_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure cluster access
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Resolve container registry
        id: registry
        run: |
          if [ -n "${{ secrets.REGISTRY_URL }}" ]; then
            echo "url=${{ secrets.REGISTRY_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

      # Substitute the SHA-tagged image into the Job manifest, apply it,
      # and block until it completes. A failed migration fails this job,
      # which halts the pipeline before any rollout step that would depend
      # on the new schema. The delete --ignore-not-found clears any
      # previous run's completed Job (Job specs are immutable, so re-apply
      # alone cannot update the image).
      - name: Run Migrations
        run: |
          sed "s|IMAGE_PLACEHOLDER|${{ steps.registry.outputs.url }}:${{ github.sha }}|" ops/jobs/apply-migrations.yaml > /tmp/apply-migrations.yaml
          kubectl delete job folkidle-apply-migrations --ignore-not-found
          kubectl apply -f /tmp/apply-migrations.yaml
          kubectl wait --for=condition=complete --timeout=300s job/folkidle-apply-migrations

  # Rolls the SHA-tagged image out to the actual server Deployment - gated
  # on migrate, so this can never run against a database schema the new
  # image has not already been migrated against. build-and-push alone only
  # produces an image; this is the step that actually puts it in front of
  # traffic. Same KUBE_DEPLOY_ENABLED/KUBE_CONFIG gating as migrate, for the
  # same reason (skipped, not failed, until a production cluster is wired
  # up).
  deploy:
    name: Deploy to Cluster
    needs: migrate
    runs-on: ubuntu-latest
    if: ${{ vars.KUBE_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure cluster access
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Resolve container registry
        id: registry
        run: |
          if [ -n "${{ secrets.REGISTRY_URL }}" ]; then
            echo "url=${{ secrets.REGISTRY_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

      # Substitutes the SHA-tagged image into deployment.yaml (mirroring the
      # migrate job's IMAGE_PLACEHOLDER substitution pattern, just against
      # deployment.yaml's own literal "folkidle-server:latest" placeholder
      # tag rather than a dedicated token) and applies it alongside hpa.yaml,
      # which carries no image reference and is applied unchanged. Blocks on
      # rollout completion so a failed/stuck rollout fails this job loudly.
      - name: Apply deployment manifests
        run: |
          sed "s|image: folkidle-server:latest|image: ${{ steps.registry.outputs.url }}:${{ github.sha }}|" server/deployment.yaml > /tmp/deployment.yaml
          kubectl apply -f /tmp/deployment.yaml -f server/hpa.yaml
          kubectl rollout status deployment/folkidle-server --timeout=180s
